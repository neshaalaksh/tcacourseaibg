<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neshworks Video Background</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1920px; height: 1080px;
  overflow: hidden; background: #0C0A0F;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

/* ── BASE GRADIENT ── */
.base {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 1600px 1000px at 36% 55%, rgba(50,44,175,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 800px 600px at 88% 12%, rgba(55,48,200,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 700px 550px at 92% 92%, rgba(160,100,10,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 500px 400px at 5% 88%, rgba(55,48,180,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 300px 250px at 50% 2%, rgba(72,64,204,0.08) 0%, transparent 60%),
    linear-gradient(165deg, #151220 0%, #0C0A0F 50%, #130F1C 100%);
}

/* ── CANVAS LAYERS ── */
#hexgrid   { position: absolute; inset: 0; pointer-events: none; }
#particles { position: absolute; inset: 0; pointer-events: none; }
#dataflow  { position: absolute; inset: 0; pointer-events: none; }

/* ── VIGNETTE ── */
.vignette {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 100% 100% at 50% 50%,
    transparent 40%, rgba(10,8,15,0.5) 80%, rgba(10,8,15,0.85) 100%);
}

/* ── FLOATING LOGOS ── */
#logo-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.fl {
  position: absolute;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  animation: logoFloat var(--dur,20s) ease-in-out infinite var(--delay,0s);
  filter: grayscale(1) brightness(2.2);
  will-change: transform, opacity;
}
.fl svg { width: var(--sz,36px); height: var(--sz,36px); }
@keyframes logoFloat {
  0%,100% { transform: translate(0,0) rotate(0deg); opacity:0; }
  10%      { opacity: var(--op,0.07); }
  35%      { transform: translate(var(--mx,12px),var(--my,-16px)) rotate(var(--r1,3deg)); }
  65%      { transform: translate(var(--mx2,-8px),var(--my2,10px)) rotate(var(--r2,-2deg)); }
  90%      { opacity: var(--op,0.07); }
}

/* ── SCREEN ── */
.screen-wrap {
  position: absolute;
  top: 50%; left: 38%;
  transform: translate(-50%, -50%);
  width: 1240px; height: 790px;
}
.screen-halo {
  position: absolute; inset: -20px; border-radius: 36px;
  background: linear-gradient(135deg,
    rgba(72,64,204,0.2) 0%, rgba(184,114,15,0.1) 50%, rgba(72,64,204,0.16) 100%);
  filter: blur(24px);
}
.screen-halo2 {
  position: absolute; inset: -7px; border-radius: 32px;
  background: linear-gradient(135deg,
    rgba(90,80,230,0.28) 0%, rgba(200,130,20,0.18) 50%, rgba(80,70,210,0.24) 100%);
  filter: blur(7px);
}
.screen-rim {
  position: absolute; inset: -1.5px; border-radius: 28px;
  background: linear-gradient(135deg,
    rgba(120,108,255,0.75) 0%,
    rgba(200,140,20,0.5) 30%,
    rgba(90,80,220,0.55) 65%,
    rgba(210,145,22,0.45) 100%);
  padding: 1.5px;
}
.screen-rim-inner { width:100%; height:100%; border-radius:27px; background:#0C0A0F; }
.screen {
  position: absolute; inset:0; border-radius:26px;
  background: rgba(12,10,15,0.45); overflow:hidden;
}
.screen-topbar {
  position: absolute; top:0; left:0; right:0; height:2.5px;
  background: linear-gradient(90deg,
    transparent 0%, rgba(120,108,255,0.9) 30%,
    rgba(220,150,20,0.9) 50%,
    rgba(120,108,255,0.9) 70%, transparent 100%);
  /* NO animation — static, clean */
}
.screen-pip {
  position: absolute; width:14px; height:14px;
  border-color: rgba(120,108,255,0.4); border-style:solid; border-width:0;
}
.pip-tl { top:14px; left:14px; border-top-width:1.5px; border-left-width:1.5px; border-radius:3px 0 0 0; }
.pip-tr { top:14px; right:14px; border-top-width:1.5px; border-right-width:1.5px; border-radius:0 3px 0 0; }
.pip-bl { bottom:14px; left:14px; border-bottom-width:1.5px; border-left-width:1.5px; border-radius:0 0 0 3px; }
.pip-br { bottom:14px; right:14px; border-bottom-width:1.5px; border-right-width:1.5px; border-radius:0 0 3px 0; }

/* ── PODIUM ── */
.podium-wrap {
  position: absolute; right: 46px; bottom: 0; width: 340px;
}
.podium-glow {
  position: absolute; bottom: 78px; right: 46px;
  width: 340px; height: 24px;
  background: radial-gradient(ellipse at center, rgba(90,80,220,0.3), transparent 70%);
  filter: blur(10px);
  animation: glowPulse 3s ease infinite;
}
.podium {
  position: relative; width:100%; height:80px;
  border-radius:18px 18px 0 0; overflow:hidden;
  border:1px solid rgba(110,100,240,0.28); border-bottom:none;
}
.podium-bg {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #1C1828 0%, #241F32 45%, #1A1626 100%);
}
.podium-shimmer {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 100% 120% at 50% 130%, rgba(80,70,210,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 8% 50%, rgba(72,64,204,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 92% 30%, rgba(184,114,15,0.06) 0%, transparent 60%);
}
.podium-topline {
  position: absolute; top:0; left:0; right:0; height:1.5px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(120,108,255,0.9) 18%,
    rgba(220,150,20,0.8) 50%,
    rgba(120,108,255,0.9) 82%,
    transparent 100%);
}
.podium-content {
  position: relative; z-index:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%; gap:5px;
}
.podium-name {
  font-size:24px; font-weight:700;
  letter-spacing:0.13em; text-transform:uppercase;
  background: linear-gradient(120deg, #BF8210 0%, #F2C555 38%, #E8A020 68%, #C07818 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter: drop-shadow(0 0 14px rgba(220,150,20,0.4));
}
.podium-sub {
  font-size:10px; font-weight:500;
  letter-spacing:0.22em; text-transform:uppercase;
  color:rgba(255,255,255,0.22);
}

/* ── OUTER FRAME CORNERS ── */
.fc { position: absolute; }
.fc-tl { top:16px; left:16px; }
.fc-tr { top:16px; right:16px; }
.fc-bl { bottom:16px; left:16px; }
.fc-br { bottom:16px; right:16px; }

/* ── RIGHT PANEL GUTTER ── */
.right-gutter {
  position:absolute; right:0; top:0; bottom:0; width:430px;
  background: linear-gradient(to left, rgba(72,64,204,0.05) 0%, transparent 100%);
  pointer-events:none;
}
.rg-line-1 {
  position:absolute; right:428px; top:0; bottom:0; width:1px;
  background: linear-gradient(to bottom,
    transparent 0%, rgba(100,90,240,0.18) 25%,
    rgba(100,90,240,0.1) 60%, rgba(184,114,15,0.12) 80%, transparent 100%);
}
.rg-line-2 {
  position:absolute; right:416px; top:0; bottom:0; width:1px;
  background: linear-gradient(to bottom,
    transparent 0%, rgba(100,90,240,0.08) 30%, transparent 100%);
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position:absolute; bottom:0; left:0; right:0; height:2.5px;
  background: linear-gradient(90deg,
    transparent 0%, rgba(72,64,204,0.45) 22%,
    rgba(184,114,15,0.55) 50%,
    rgba(72,64,204,0.45) 78%, transparent 100%);
}

@keyframes glowPulse { 0%,100%{opacity:.35} 50%{opacity:.75} }
</style>
</head>
<body>

<svg class="fc fc-tl" width="64" height="64" viewBox="0 0 64 64">

<svg class="fc fc-tr" width="64" height="64" viewBox="0 0 64 64">

  <circle cx="64" cy="0" r="3.5" fill="rgba(110,100,240,0.55)"/>
  <circle cx="64" cy="0" r="1.5" fill="rgba(110,100,240,0.9)"/>
</svg>
<svg class="fc fc-bl" width="64" height="64" viewBox="0 0 64 64">
  <path d="M0 0 L0 54 Q0 64 10 64 L64 64" stroke="rgba(110,100,240,0.28)" stroke-width="1.5" fill="none"/>
  <circle cx="0" cy="64" r="3.5" fill="rgba(110,100,240,0.38)"/>

</svg>
<svg class="fc fc-br" width="64" height="64" viewBox="0 0 64 64">
  <path d="M64 0 L64 54 Q64 64 54 64 L0 64" stroke="rgba(110,100,240,0.28)" stroke-width="1.5" fill="none"/>
  <circle cx="64" cy="64" r="3.5" fill="rgba(110,100,240,0.38)"/>

<!-- SCREEN -->

</div>

<!-- PODIUM -->

      <span class="podium-name">Neshaa Laksh</span>
      <span class="podium-sub">Fractional AI Operator · Neshworks</span>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 1. HEX GRID — static, drawn once
// ═══════════════════════════════════════════════════════════════
(function() {
  const svg = document.getElementById('hexgrid');
  const ns = 'http://www.w3.org/2000/svg';
  const R = 48;
  const W = R * 2, H = Math.sqrt(3) * R;
  const cols = Math.ceil(1920 / (W * 0.75)) + 2;
  const rows = Math.ceil(1080 / H) + 2;

  // screen center for proximity fade
  const SCX = 1920 * 0.38, SCY = 540;
  const SHW = 640, SHH = 420; // half-dims of screen

  for (let row = -1; row < rows; row++) {
    for (let col = -1; col < cols; col++) {
      const cx = col * W * 0.75;
      const cy = row * H + (col % 2 === 0 ? 0 : H / 2);

      // skip hexes inside screen
      if (cx > SCX - SHW - 20 && cx < SCX + SHW + 20 &&
          cy > SCY - SHH - 20 && cy < SCY + SHH + 20) continue;

      // distance-based fade from screen edge
      const nearX = Math.max(0, Math.abs(cx - SCX) - SHW);
      const nearY = Math.max(0, Math.abs(cy - SCY) - SHH);
      const edgeDist = Math.sqrt(nearX*nearX + nearY*nearY);
      const edgeFade = Math.min(1, edgeDist / 280);

      // corner vignette fade
      const ex = Math.min(cx / 180, (1920-cx) / 180, 1);
      const ey = Math.min(cy / 120, (1080-cy) / 120, 1);
      const vignFade = Math.min(ex, ey);

      const seed = ((row * 137 + col) * 7919) & 0xfffff;
      const rnd = (seed % 1000) / 1000;

      const baseOp = edgeFade * vignFade;
      if (baseOp < 0.02) continue;

      const strokeOp = baseOp * (0.04 + rnd * 0.06);
      const filled = rnd > 0.93;
      const fillOp = filled ? baseOp * (0.03 + rnd * 0.04) : 0;

      const pts = [];
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 180 * (60 * i - 30);
        pts.push((cx + R * Math.cos(a)).toFixed(1) + ',' + (cy + R * Math.sin(a)).toFixed(1));
      }

      const poly = document.createElementNS(ns, 'polygon');
      poly.setAttribute('points', pts.join(' '));
      poly.setAttribute('stroke', `rgba(88,78,220,${strokeOp.toFixed(4)})`);
      poly.setAttribute('stroke-width', '0.55');
      if (filled) poly.setAttribute('fill', `rgba(72,64,200,${fillOp.toFixed(4)})`);
      else poly.setAttribute('fill', 'none');
      svg.appendChild(poly);
    }
  }
})();

// ═══════════════════════════════════════════════════════════════
// 2. NEURAL PARTICLES — animated, in margins only
// ═══════════════════════════════════════════════════════════════
(function() {
  const c = document.getElementById('particles');
  const ctx = c.getContext('2d');
  const P = 'rgba(80,70,220,', G = 'rgba(184,114,15,';

  // zones outside screen
  const ZONES = [
    {x:0,    y:0,    w:220,  h:1080},  // far left
    {x:1700, y:0,    w:220,  h:1080},  // far right
    {x:220,  y:0,    w:1480, h:105},   // top strip
    {x:220,  y:975,  w:1480, h:105},   // bottom strip
    {x:1480, y:105,  w:220,  h:870},   // right gutter
  ];
  const counts = [20, 16, 12, 12, 10];
  const nodes = [];

  ZONES.forEach((z, zi) => {
    for (let i = 0; i < counts[zi]; i++) {
      nodes.push({
        x: z.x + Math.random() * z.w,
        y: z.y + Math.random() * z.h,
        vx: (Math.random()-.5)*.18, vy: (Math.random()-.5)*.18,
        r: 1.2 + Math.random()*2,
        ph: Math.random()*Math.PI*2,
        ps: .005 + Math.random()*.009,
        gold: Math.random() < .14,
        zi
      });
    }
  });

  function clamp(n) {
    const z = ZONES[n.zi], p = 14;
    if (n.x < z.x+p) n.vx += .035;
    if (n.x > z.x+z.w-p) n.vx -= .035;
    if (n.y < z.y+p) n.vy += .035;
    if (n.y > z.y+z.h-p) n.vy -= .035;
    n.vx *= .982; n.vy *= .982;
  }

  function draw() {
    ctx.clearRect(0, 0, 1920, 1080);
    nodes.forEach(n => { n.x+=n.vx; n.y+=n.vy; n.ph+=n.ps; clamp(n); });

    // connections
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x-b.x, dy = a.y-b.y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if (d < 185) {
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
          ctx.strokeStyle = (a.gold||b.gold?G:P) + ((1-d/185)*.13) + ')';
          ctx.lineWidth = .65; ctx.stroke();
        }
      }
    }

    // nodes
    nodes.forEach(n => {
      const p = (Math.sin(n.ph)+1)/2;
      const col = n.gold ? G : P;
      const al = .25+p*.5, r = n.r+p*1.1;
      const gr = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*5);
      gr.addColorStop(0, col+(al*.5)+')'); gr.addColorStop(1, col+'0)');
      ctx.beginPath(); ctx.arc(n.x,n.y,r*5,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fillStyle=col+al+')'; ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════════════════════
// 3. DATA STREAMS — flowing vertical light streams in side margins
// ═══════════════════════════════════════════════════════════════
(function() {
  const c = document.getElementById('dataflow');
  const ctx = c.getContext('2d');

  const streams = [];
  // create streams only in left and right gutters
  const gutterZones = [
    {x:0, w:220},    // left
    {x:1700, w:220}, // right
  ];

  gutterZones.forEach(gz => {
    for (let i = 0; i < 8; i++) {
      streams.push({
        x: gz.x + Math.random() * gz.w,
        y: Math.random() * 1080,
        len: 60 + Math.random() * 120,
        speed: 0.4 + Math.random() * 0.8,
        op: 0.05 + Math.random() * 0.12,
        gold: Math.random() < 0.2,
        w: 0.5 + Math.random() * 0.8,
      });
    }
  });

  function draw() {
    ctx.clearRect(0, 0, 1920, 1080);
    streams.forEach(s => {
      s.y += s.speed;
      if (s.y - s.len > 1080) s.y = -s.len;

      const col = s.gold ? '184,114,15' : '80,70,220';
      const grad = ctx.createLinearGradient(s.x, s.y - s.len, s.x, s.y);
      grad.addColorStop(0, `rgba(${col},0)`);
      grad.addColorStop(0.5, `rgba(${col},${s.op})`);
      grad.addColorStop(1, `rgba(${col},0)`);

      ctx.beginPath();
      ctx.moveTo(s.x, s.y - s.len);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.w;
      ctx.stroke();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════════════════════
// 4. FLOATING AI LOGOS
// ═══════════════════════════════════════════════════════════════
(function() {
  const logos = [

  // only place logos in left margin and right gutter, not near screen
  const PLACE_ZONES = [
    {x:10, y:10, w:200, h:1060},
    {x:1720, y:10, w:190, h:1060},
    {x:210, y:10, w:400, h:90},
    {x:1300, y:980, w:600, h:90},
  ];

  const layer = document.getElementById('logo-layer');

  logos.forEach((svg) => {
    const sz = 28 + Math.floor(Math.random() * 24);
    const pz = PLACE_ZONES[Math.floor(Math.random() * PLACE_ZONES.length)];
    const x = pz.x + Math.random() * (pz.w - sz);
    const y = pz.y + Math.random() * (pz.h - sz);

    const mx  = (Math.random()-.5)*26, my  = (Math.random()-.5)*26;
    const mx2 = (Math.random()-.5)*16, my2 = (Math.random()-.5)*16;
    const r1  = (Math.random()-.5)*9,  r2  = (Math.random()-.5)*7;
    const dur = 14 + Math.random()*14;
    const delay = -(Math.random() * 22);
    const op = 0.055 + Math.random()*0.05;

    const el = document.createElement('div');
    el.className = 'fl';
    el.style.cssText = `left:${x}px;top:${y}px;--sz:${sz}px;--dur:${dur}s;--delay:${delay}s;--mx:${mx}px;--my:${my}px;--mx2:${mx2}px;--my2:${my2}px;--r1:${r1}deg;--r2:${r2}deg;--op:${op};`;
    el.innerHTML = svg;
    layer.appendChild(el);
  });
